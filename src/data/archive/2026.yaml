accolades:
  - name:
      fi: 'RatAS-kunnianosoitukset'
      en: 'RatAS accolade'
    people:
      - name: Aapo Vuokila
        description:
          fi: 'Tämä kiltalainen on osoittanut suoraa nousujohteisuutta killassa toimiessaan. Kiltaura alkoi mallikkaalla toiminnalla DSDeputyn roolissa, missä hän ei vain järjestänyt tapahtumia, vaan vahvensi DSDn asemaa killan sisällä. Tämän jälkeen jatkoi hän roolia KV-kipparina pitäen huolta, että killan englanninkielisillekkin löytyi mielekkäitä tapahtumia. Ahkerasti tämä kiltalainen auttoi puolta Otaniemeä esteettömyystodistuksien kanssa. Tämä dronea lennättävä leijona, joka ei turhasta huolestu, on Aapo Vuokila!'

          en: "This guild member has shown a clear upward trajectory in their work within the guild. Their guild career began with exemplary work in the role of DSDeputy, where they didn't just organize events but strengthened the position of DSD within the guild. After that, they continued in the role of Master's and international fuksi captain, making sure that even the English-speaking members of the guild had meaningful events to enjoy. Diligently, this guild member helped half of Otaniemi with certificates of nonimpediment. This drone-flying lion who doesn't worry needlessly is Aapo Vuokila!"

      - name: Nuutti Laine
        description:
          fi: 'Koskaan jos sitseillä seura alkaa kyllästyttämään ja kaipaat vähän toimintaa, niin voit hänelle mennä asiasta sanomaan lukkaripöytään. Sillä tämä kiltalainen kyllä pitää sellaisen aasinsillan, mikä saa kulmakarvat nousemaan ja sitsikansan nauramaan. Tämän kiltalaisen juttuja pääsee kyllä myös lukemaan GT-lehdestä. Ja että varmasti olet tähän toimariin törmännyt, on hän jo usean vuoden ollut Kulttuuritoimikunnassa ja nyt Säädössä mukana. Tämä aktiivinen toimari on tietenkin, Nuutti Laine!'

          en: "If you ever get bored of the company at a sitsit and are looking for a little action, you can go tell it to him at the lukkari table. For this guild member will always find a segue that raises eyebrows and makes the sitsit crowd laugh. You can also read this guild member's pieces in the GT magazine. And to make sure you've definitely run into this active member, they have been in the Cultural Committee for several years and are now also part of Säätö. This active committee member is of course, Nuutti Laine!"

      - name: Leila Lavonen
        description:
          fi: 'Tämä kiltalainen toiminut niin kuin on näkynyt killassa eri pesteissä. Vuoden toimittuaan minIEninä hän päätti, että toimikunnan johtaminen voisi olla hänelle sopivampaa. Näin hän lähti killan Isännäksi. Mutta ei hallitusvuotta ilman toista, sillä tämä kiltalainen jatkoi toimintaa Varapuheenjohtajan roolissa pitäen huolen siitä, että hallituslaiset ja toimikuntien johtajat saivat virkistykset mitkä ansaitsivat. Nyt hän jatkaa vielä GTn toimituksessa, Kultsina, Dokumentoijana sekä tietenkin Stimulanttina. Tämä kovan tason tekijä on Leila Lavonen!'
          en: 'This guild member has been visibly active in the guild across various roles. After a year as minIEn, they decided that leading a committee might suit them better, and so they took on the role of Host of the guild. But a board year is never just one — this guild member continued as Vice-Chair, making sure that board members and committee leaders received the refreshments they deserved. Now they continue in the GT editorial team, as Kultsi, Documenter, and of course as Stimulantti. This high-level doer is Leila Lavonen!'

      - name: Mikhail Romanov
        description:
          fi: 'Mikä voisi olla parempi tapa aloittaa ura killassa kuin hyppäämällä samantien syvään päätyyn. Tämä kiltalainen aloitti pestinsä minIEninä, Liikkujana ja tietenkin hallituksessa Opintomesterina. Hallitusvuoden jälkeen hän päätyi vielä Puheenjohtajaksi. Mallikkaasti killan kahden vuoden tilinpäätösten tehtyään hän vieläkin jatkaa killan yrityssuhteiden ja vujujen parissa. Tämä Killistelijä ja killan teräsjuoksija on Mikhail Romanov!'
          en: "What could be a better way to start a guild career than jumping straight into the deep end? This guild member started their posts as minIEn, Liikkuja, and of course on the board as Opintomaster. After the board year, they went on to become Chairman. Having masterfully prepared the guild's two-year financial statements, they still continue working on the guild's corporate relations and vujus. This Killistelija and the guild's iron runner is Mikhail Romanov!"

      - name: Saku Parttimaa
        description:
          fi: 'Tämä kiltalainen ei haasteita pelkää. Hän astui heti fuksivuonna rahastonhoitajan saappaisiin, ja isot oli saappaat killan vaikean taloustilanteen takia. Roolin ohella hauskanpitoa löytyi myös Lukkarin pestissä. Nyt vaikka isot saappaat löytyvät AYYn puolelta, ei tämä henkilö ole kiltaa unohtanut toimimalla Lukkarina, Kultaisena taittajana, Mentorina, Kultsina ja Depressanttina. Välillä on myös tärkeää ylläpitää killan ulkosuhteita lupaamalla järjestää sponttanisti sillis Kannunvalajille. Tämä neppisauton työntäjä on Saku Parttimaa!'
          en: "This guild member doesn't fear challenges. They stepped straight into the treasurer's shoes in their fuksi year, and big shoes they were, given the guild's difficult financial situation. Alongside the role, fun was also found as a Lukkari. Now, even though the big shoes are on AYY's side, this person hasn't forgotten the guild, serving as Lukkari, Kultainen taittaja, Mentor, Kultsi, and Depressantti. Sometimes it's also important to maintain the guild's external relations by spontaneously promising to organize a sillis for Kannunvalajat. This pusher of the neppisauto is Saku Parttimaa!"

      - name: Aarno Koponen
        description:
          fi: 'Tämä henkilö on kokenut sen, kun rooli mitä moni ei halua koskaan joutua tekemään, tarvitsee tekijäänsä. Tämä kiltalainen ei pelännyt, vaan nosti oman kätensä ylös kiltakokouksessa. Tehtävä oli haastava, sillä toiminnan tarkastus ei jäänyt vain vuoteen, vaan piti myös täydentää edellisen vuoden tilintarkastus. Haasteen sekä tarvittavat TUTA-kurssit otettuaan, suoriutui hän tehtävästä erinomaisesti. Tämä kiltahuoneelta löytyvä aktiivi Säätökisälli ja kaksi TT:ta tehnyt kiltalainen on kukapa muu kuin, Aarno Koponen!'
          en: "This person has experienced what it means when a role that many never want to take on needs someone to step up. This guild member didn't hesitate, but raised their own hand at the guild meeting. The task was challenging, as the audit didn't just cover one year but also required completing the previous year's audit. Having taken on the challenge and completing the necessary TUTA courses, they performed the task excellently. This active tinkerer found in the guild room who has completed two financial audits is none other than, Aarno Koponen!"

      - name: Jesperi Hildén
        description:
          fi: 'Mikäli kaipaat tapahtumallesi hypeä mainostekstiä tai unohtumatonta ohjelmanumeroa, on tämä henkilö se, jolta haluat pyytää apua. ASkivahdin, Lukkarin tai minIEnin roolit eivät tälle kiltalaiselle riittäneet, vaan päätti hän tupsuna ottaa roolia myös killan Emäntänä. Jotta ei olisi projektia killassa vetämättä, järjesti hän myös kiltalaisille ikimuistoisen rrrRankan neljällä r:llä. Tämä clipboardia heiluttava Retkimestari ja Skeittiön lämmittäjä on tietenkin, Jesperi Hildén!'
          en: "If you need hype advertising text or an unforgettable entertainment number for your event, this is the person you want to ask for help. The roles of ASkivahti, Lukkari, and minIEn weren't enough for this guild member — as a second-year (tupsu), they decided to also take on the role of Hostess of the guild. So that there wouldn't be a project in the guild they haven't led, they also organized the memorable rrrRanka (with four r's) for guild members. This clipboard-wielding Retkimestari and Skeittiö warmer is of course, Jesperi Hildén!"

      - name: Säde Mikkonen
        description:
          fi: 'Henkilö jolla ei työt lopu. Tämä kiltalainen on toiminut lukuisissa toimarirooleissa, kuten Liikunta, ASki, Talous ja Säätötoimikunnissa. Työt Yrityssuhdetoimikunnassa kannustivat häntä lähteä seuraavana vuonna hakemaan hallitukseen. Kun päivisin hän takoi killalle rahaa, niin öisin hän piti huolen, että jatkoilla ei Spotify shufflea tarvinnut soittaa. Raskaan hallitusvuoden jälkeen hommat ovat killassa jatkuneet viestinnän, vujujen ja jatkuvuuden merkeissä. Tämä killan DJ ja toimikunta-aktiivi on tietenkin Säde Mikkonen!'
          en: 'A person whose work never runs out. This guild member has served in numerous official roles, such as the Sports, ASki, Finance and tinkering committees. Her work on the Corporate Relations Committee encouraged her to run for the board the following year. While by day she raked in money for the guild, by night she made sure that no one had to resort to a Spotify shuffle at the afterparties. After a demanding year on the board, her work in the guild has continued in the spirit of communications, the annual ball and continuity. This guild DJ and committee regular is, of course, Säde Mikkonen!'

      - name: Kalle Kajoniemi
        description:
          fi: 'Tämä henkilö lähti killan toimintaan mukaan heti fuksivuonna. Hän aloitti saman tien Lukkarina, ASkivahtina, minIEninä ja Liikkujana. Nopeasti hän kuitenkin huomasi parantamisen kohteita fuksitoiminnassa ja lähtikin heti tupsuna Fuksikippariksi. Järjestäessään mitä loistavempia tapahtumia ja pitäessään huolta fukseista, hän jatkaa nyt töitä Absinttina sekä lukkarina. Tämä keilapallon killan kulttuuriin tuoja on, arvasitte oikein, Kalle Kajoniemi!'
          en: "This person jumped into the guild's activities right away during their fuksi year. He started immediately as Lukkari, ASkivahti, minIEni and Liikkuja. Soon, however, he noticed things that could be improved in fuksi activities, and as a tupsu he went straight for the role of Fuksi captain. Having organized ever more splendid events and looked after the fuksis, he now continues his work as Absintti and Lukkari. This bringer of the bowling ball into the guild's culture is — you guessed it — Kalle Kajoniemi!"

      - name: Veeti Kittamaa
        description:
          fi: 'Tämä killan toimari on käynyt toimikuntia läpi kuin soittanut bängereitä Smökin tanssilattialle. Hän on jo useamman vuoden istunut sitsinsä lukkaripöydässä tai Skeittiön puolella vahtien, että ruoka valmistuu ajallaan. ASkin sohva on tuttu paikka ja sieltähän on helppo vahtia, että kahvikupit päätyvät tiskikoneeseen. Jotta killassa tulisi kaikki koettua, on hänellä pesti nyt myös liikunta- ja säätötoimikunnassa. Kruununjalokivenä hän myös järjesti kiltalaisille rrrRankan. Tämä DJ-dekkiä mukana kantava toimari on, arvasitte oikein, Veeti Kittamaa!'
          en: "This guild committee member has gone through committees like playing bangers on Smökki's dance floor. They have for several years sat at the lukkari table at their sitsit or on the Skeittiö side, making sure the food gets ready on time. The ASki sofa is a familiar spot, and from there it's easy to make sure that coffee cups end up in the dishwasher. To make sure they've experienced everything the guild has to offer, they now also have a post in the sports and tinkering committees. As the crown jewel, they also organized the rrrRanka for guild members. This committee member who carries a DJ deck with them is, you guessed it, Veeti Kittamaa!"

      - name: Violet Nevalainen
        description:
          fi: 'Tämä toimari on osoittanut suurta rakkautta kiltaan kohtaan heti fuksivuodesta alkaen. Hän on ottanut toimikuntatitteleitä Kultsina, Lukkarina, ASkivahtina, Säätökisällinä ja Miscellanouksena. Vaikka toimikuntia on monta, niin ei hän jätä yhtään toimikunnanvetäjän viestiä luetulle. Tämä kiltalainen kantaa ASn haalareita aina ylpeydellä ja auttaa aina kun apua tarvitaan. Tämä ASkista löytyvä mielenkohoittaja on kukapa muu kuin, Violet Nevalainen!'
          en: "This committee member has shown great love for the guild right from their fuksi year. They have taken on committee titles as Kultsi, Lukkari, ASkivahti, Säätökisälli, and Miscellaneous. Even though there are many committees, they never leave any committee leader's message on read. This guild member always wears AS overalls with pride and always helps when help is needed. This mood-lifter found at ASki is none other than, Violet Nevalainen!"

      - name: Pyry Kiviluoma
        description:
          fi: 'Tämä aktiivinen toimari on ottanut koppia useasta toimikunnasta. Titteleitä löytyy Liikkujana, Account managerina, minIEninä, Retkisällinä sekä Säätökisällinä. Yhtenä aktiivisimpana Yrityssuhdetoimikuntalaisena hän hoitaa, ettei killan varat lopu kesken. Tapahtumissa hän on aina Härynä pitämässä huolta, että kaikilla on hyvä olla, eikä häirintää tapahdu. Tämä aina tapahtumissa pinkkiä liiviä kantava kiltalainen on Pyry Kiviluoma!'
          en: "This active committee member has taken responsibility in many committees. Titles include Liikkuja, Account manager, minIEn, Retkisälli, and Säätökisälli. As one of the most active Corporate Relations Committee members, they ensure that the guild's funds don't run dry. At events, they are always there as confidential counselor, making sure everyone is doing well and that no harassment occurs. This guild member who always wears a pink vest at events is Pyry Kiviluoma!"

      - name: Timi Lehtisyrjä
        description:
          fi: 'Kun fuksivuonna tältä kiltalaiselta pyydettiin apua ottamaan vastuuta toimikunnasta, niin ei hänen tarvinnut kauaa miettiä asiaa. Hän nappasi saman tien Liikuntamestarin roolin itselleen. Eikä roolit tähän loppuneet, sillä hän pystyi aktiivisesti toimia myös minIEninä sekä Fuksiassistenttinä. Ratkaisija aASin saa killan urheiluinnon kasvattaja ja Megaskaba hypettäjä Timi Lehtisyrjä!'
          en: "When this guild member was asked in their fuksi year to take responsibility for a committee, they didn't need to think about it for long. They immediately grabbed the role of Liikuntamestari for themselves. And the roles didn't stop there, as they were also able to actively serve as minIEn and Fuksiassistentti. This RatAS goes to the promoter of the guild's sports enthusiasm and hype-builder for Megaskaba, Timi Lehtisyrjä!"

      - name: Matias Kalliokoski
        description:
          fi: 'Tämä aktiivinen minIEn sekä Kultsi on pitänyt huolta siitä, että kiltalaisten vatsat pysyvät täynnä ja kurkkua ei turhaan kuivaa. Kyseinen kiltalainen on ottanut työkseen edistää killan Poika tarjontaa, joka paranee vuosikerta aina paremmaksi. Kun häneltä kysyy apua vaikka kuinka tyhmään juttuun, kuten lähteä Ullikselle kasaamaan telttaa aamukuudelta, hän kyllä lähtee mukaan ja antaa järkkärillekkin syyn muistaa hänet. Tämä Poikatoimikuntaa ajava Fuksiassistentti on tietenkin Matias Kalliokoski!'
          en: "This active minIEn and Kultsi has made sure that guild members' stomachs stay full and throats don't needlessly go dry. This guild member has made it their mission to advance the guild's Poika selection, which improves vintage by vintage. When you ask them for help with even the silliest things — like going to Ullis at six in the morning to set up a tent — they will absolutely join in and give even the organizer a reason to remember them. This Fuksiassistentti who drives the Poika committee is of course Matias Kalliokoski!"
