desc:
  fi: >
    ELECin opiskelijoille suunnattu elektroniikan ja
    sähkötekniikan sivuaine koostuu viidestä
    vapaavalintaisesta kurssista, jotka opiskelija voi
    valita kymmenen kurssin joukosta. Sivuaineen sisältö on
    hyvin muokattavissa omien mielenkiinnon kohteiden
    mukaan. Tarjolla olevien kurssien joukosta löytyy
    aiheita aina sähköisten piirien analyysistä
    kvanttifysiikkaan. Sivuaine on oiva valinta esimerkiksi
    niille, jotka ovat kiinnostuneita automaatioon
    liittyvästä sähkötekniikasta tai haluavat jatkaa
    elektroniikan ja nanotekniikan maisteriohjelmaan.

    Miksi tämä sivuaine kannattaisi valita ja miten se tukee
    pääaineopintoja?

    Elektroniikan ja sähkötekniikan sivuaine kannattaisi
    valita, jos sinua kiinnostaa oppia lisää sähköisten
    piirien toiminnasta, elektroniikassa käytetyistä
    komponenteista ja materiaaleista, sähkömagneettisista
    kentistä ja antenneista tai kvanttiteoriasta.
    Sivuaineesta voi halutessaan tehdä hyvin monipuolisen
    käymällä eri aihepiireihin liittyviä kursseja, tai on
    mahdollista myös keskittyä enemmän esimerkiksi
    sähköisten piirien analyysiin. Koska sähkötekniikka on
    myös tärkeä osa automaatiota, tukee tämä sivuaine hyvin
    automaation ja robotiikan pääaineopintoja. Joillakin
    kursseilla esimerkiksi käydään hyvin samankaltaisia
    konsepteja kuin automaation pääainekursseilla, mutta eri
    asiayhteyksissä, mikä tukee näiden aiheiden laajempaa
    ymmärtämistä.
  en: 'TEKSTIÄ IN INGLISH'

