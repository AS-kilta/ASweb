courses:
  info:
    fi: ''
    en: ''
  list:
    fi:
      - >
        ELEC-C4140 Kenttäteoria (I-II). Kurssi on
        käytännössä jatkoa perusopintojen kurssille
        ELEC-A4130 Sähkö ja magnetismi. Kurssilla
        perehdytään syvällisemmin Maxwellin yhtälöihin, ja
        etenkin kurssin alkupuolella on hyötyä myös kurssin
        MS-A0305 Differentiaali- ja integraalilaskenta 3
        sisällöistä. Kurssin loppupuolella perehdytään
        antennien toimintaan, ja kurssi onkin erinomainen
        pohja, jos olet kiinnostunut antennisuunnittelusta
        maisteriopinnoissa. Kurssi kannattaa käydä heti
        toisen kandivuoden syksyllä.
      - >
        ELEC-C9230 Elektroniikka (I-II). Kurssilla
        perehdytään epälineaaristen
        elektroniikkakomponenttien, kuten diodien ja
        transistorien toimintaan. Kurssin loppupuoli koostuu
        takaisinkytkettyjen piirien ja operaatiovahvistimien
        toiminnan analyysistä. Etenkin piirien
        takaisinkytkentäanalyysi tukee automaation ja
        robotiikan pääaineopintoja, koska se muistuttaa
        hyvin paljon säätöteorian takaisinkytkentöjen
        analyysiä. Yleisesti suositellaan käymään kurssi
        ELEC-C9120 Sähköisten järjestelmien analyysi
        esitietoina ennen tätä kurssia, mutta se ei ole
        välttämätöntä.
    en:
      - 'EMPTY LIST LOL'
